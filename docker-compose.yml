services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ourairports}
      POSTGRES_USER: ${POSTGRES_USER:-ourairports}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ourairports}
    #ports:
    #  - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    env_file: .env
    depends_on:
      - db
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./:/app

volumes:
  pgdata:
